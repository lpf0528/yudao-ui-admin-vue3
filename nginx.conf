server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip 压缩 ──────────────────────────────────────────
    gzip            on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/javascript
                    application/json application/xml image/svg+xml
                    font/woff2;
    gzip_vary       on;

    # ── 后端 API 反向代理（同机 Docker 网络内通过服务名访问）──
    location /admin-api/ {
        proxy_pass         http://yudao-server:48080/admin-api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket 代理 ─────────────────────────────────────
    location /infra/ws {
        proxy_pass         http://yudao-server:48080/infra/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── 内嵌页面代理（Druid 监控、Swagger 文档、报表等）────
    location ~ ^/(druid|doc\.html|swagger-ui|jmreport|drag|admin)/ {
        proxy_pass         http://yudao-server:48080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── 静态资源长缓存（Vite 产物带 hash，永久缓存安全）───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Vue Router history 模式 ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
