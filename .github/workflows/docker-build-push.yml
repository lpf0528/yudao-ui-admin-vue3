name: 前端 - 构建推送 DockerHub 镜像

on:
  push:
    branches:
      - master


    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.vscode/**'
      - '.image/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io

  # Docker Hub 仓库名
  # 格式：dockerhub用户名/仓库名
  IMAGE_NAME: eatsleeprun/yudao-ui-admin-vue3

jobs:

  # ─────────────────────────────────────────────
  # 1. 代码检查
  # ─────────────────────────────────────────────
  lint:
    name: 代码检查
    runs-on: ubuntu-latest

    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

  # ─────────────────────────────────────────────
  # 2. 构建并推送镜像
  # ─────────────────────────────────────────────
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest

    needs: [lint]

    if: always() && (needs.lint.result == 'success' || needs.lint.result == 'skipped')

    outputs:
      image_full: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
      image_tag: ${{ steps.meta.outputs.version }}

    steps:

      # ── 1. 检出代码 ─────────────────────────────
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 2. Docker Buildx ───────────────────────
      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. 生成镜像元数据 ──────────────────────
      - name: 生成镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}

          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref_name == 'master' || github.ref_name == 'main' }}

          labels: |
            org.opencontainers.image.title=yudao-ui-admin-vue3
            org.opencontainers.image.description=芋道管理后台 Vue3
            org.opencontainers.image.revision=${{ github.sha }}

      # ── 4. 登录 Docker Hub ─────────────────────
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. 构建并推送 Docker 镜像 ───────────────
      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile

          push: true

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          platforms: linux/amd64

          # DockerHub Registry Cache
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}-cache:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}-cache:buildcache,mode=max

          # 提升推送速度
          provenance: false
          sbom: false

      # ── 6. 输出摘要 ─────────────────────────────
      - name: 输出构建结果
        run: |
          echo "## 🚀 镜像推送成功" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'master' || github.ref_name == 'main'
    steps:
      - name: SSH 远程部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          request_pty: true
          script: |
            IMAGE="docker.io/eatsleeprun/yudao-ui-admin-vue3:latest"
            CONTAINER="yudao-ui"

            echo "▶ 拉取镜像: $IMAGE"
            sudo docker pull "$IMAGE" || { echo "❌ 镜像拉取失败，终止部署"; exit 1; }

            echo "▶ 备份并停止旧容器"
            sudo docker rename "$CONTAINER" "${CONTAINER}-old" 2>/dev/null || true
            sudo docker stop "${CONTAINER}-old" 2>/dev/null || true

            echo "▶ 启动新容器"
            if sudo docker run -d \
              --name "$CONTAINER" \
              -p 80:80 \
              "$IMAGE"; then
              echo "✅ 启动成功，清理旧容器"
              sudo docker rm "${CONTAINER}-old" 2>/dev/null || true
              sudo docker image prune -f
            else
              echo "❌ 启动失败，回滚旧容器"
              sudo docker rm "$CONTAINER" 2>/dev/null || true
              sudo docker rename "${CONTAINER}-old" "$CONTAINER"
              sudo docker start "$CONTAINER"
              exit 1
            fi

      - name: 输出部署结果
        run: |
          echo "## ✅ 前端部署成功" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | \`docker.io/eatsleeprun/yudao-ui-admin-vue3:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 服务器 | \`${{ secrets.SERVER_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
  # ─────────────────────────────────────────────
  # 3. 通知（可选）
  # ─────────────────────────────────────────────
  notify:
    name: 通知
    runs-on: ubuntu-latest

    needs: [build-and-push]

    if: always()

    steps:
      - name: 成功通知
        if: needs.build-and-push.result == 'success'
        run: |
          echo "✅ 构建成功：${{ needs.build-and-push.outputs.image_full }}"

      - name: 失败通知
        if: needs.build-and-push.result == 'failure'
        run: |
          echo "❌ 构建失败，请检查 Actions 日志"